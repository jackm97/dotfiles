schemes:
  # Tokyo Night theme, based on both:
  #   https://github.com/ghifarit53/tokyonight-vim
  #   https://github.com/enkia/tokyo-night-vscode-theme
  tokyo-night: &tokyo-night
    # Default colors
    primary:
      background: '#2D3144'
      foreground: '#BFC7D5'

    # Normal colors
    normal:
      black: '#292D3E'
      red: '#F07178'
      green: '#C3E88D'
      yellow: '#FFCB6B'
      blue: '#82AAFF'
      magenta: '#C792EA'
      cyan: '#60ADEC'
      white: '#ABB2BF'

    # Bright colors
    bright:
      black: '#959DCB'
      red: '#F07178'
      green: '#C3E88D'
      yellow: '#FF5572'
      blue: '#82AAFF'
      magenta: '#FFCB6B'
      cyan: '#676E95'
      white: '#FFFEFE'

  tokyo-night-storm:
    # Default colors
    primary:
      background: '0x24283b'
      foreground: '0xa9b1d6'

    # Normal colors
    normal:
      black: '0x32344a'
      red: '0xf7768e'
      green: '0x9ece6a'
      yellow: '0xe0af68'
      blue: '0x7aa2f7'
      magenta: '0xad8ee6'
      cyan: '0x449dab'
      white: '0x9699a8'

    # Bright colors
    bright:
      black: '0x444b6a'
      red: '0xff7a93'
      green: '0xb9f27c'
      yellow: '0xff9e64'
      blue: '0x7da6ff'
      magenta: '0xbb9af7'
      cyan: '0x0db9d7'
      white: '0xacb0d0'

    gruvbox_material_hard_dark: &gruvbox_material_hard_dark
